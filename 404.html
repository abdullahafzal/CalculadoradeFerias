<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Page Not Found | {{SITE_NAME}}</title>
<meta name="robots" content="noindex, nofollow">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
/* REPLACE with site palette */
--primary:#5C8A6E;--primary-dark:#2A4E3A;--bg:#FAFAF7;--text:#2C3830;--muted:#4A6152
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px}
.box{max-width:440px}
.code{font-size:96px;font-weight:700;color:var(--primary);line-height:1;margin-bottom:12px}
h1{font-size:22px;font-weight:600;margin-bottom:12px}
p{font-size:15px;color:var(--muted);line-height:1.7;margin-bottom:24px}
a{display:inline-block;padding:12px 28px;background:var(--primary);color:#fff;border-radius:8px;text-decoration:none;font-size:14px;font-weight:600}
</style>
</head>
<body>
<div class="box">
<div class="code">404</div>
<h1>Page Not Found</h1>
<p>The page you are looking for does not exist or has been moved. Head back to the homepage.</p>
<a href="/">Go to Homepage</a>
</div>
</body>
</html>
